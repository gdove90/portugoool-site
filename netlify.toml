[build]
  command = "npm run build"
  publish = ".next"

# Official Netlify adapter for Next.js (App Router, API routes, SSR).
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# goool.shop is the primary domain (phase-2 flip, 2026-07-09).
# portugoool.com stays owned forever and 301s here.
[[redirects]]
  from = "https://portugoool.com/*"
  to = "https://goool.shop/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.portugoool.com/*"
  to = "https://goool.shop/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.goool.shop/*"
  to = "https://goool.shop/:splat"
  status = 301
  force = true
