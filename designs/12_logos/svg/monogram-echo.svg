  <circle cx="54" cy="110" r="15" fill="#0A0A0A"/>
  <g clip-path="url(#e)" fill="none">
    <circle cx="54" cy="110" r="38" stroke="#C1121F" stroke-width="13"/>
    <circle cx="54" cy="110" r="68" stroke="#C1121F" stroke-width="13"/>
    <circle cx="54" cy="110" r="98" stroke="#C9A227" stroke-width="13"/>
  </g>
</svg>
